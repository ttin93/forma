<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forma Embed Playground — Sun Pergola</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, sans-serif;
        background: #f5f5f0;
        color: #111;
      }
      /* Fake manufacturer nav */
      nav {
        background: #1a1a1a;
        color: #fff;
        padding: 0 24px;
        height: 56px;
        display: flex;
        align-items: center;
        gap: 24px;
      }
      nav strong { font-size: 16px; letter-spacing: -.02em; }
      nav a { color: #aaa; font-size: 13px; text-decoration: none; }
      nav a:hover { color: #fff; }

      /* Hero */
      .hero {
        background: #1a1a1a;
        color: #fff;
        padding: 60px 24px 48px;
        text-align: center;
      }
      .hero h1 { font-size: 40px; font-weight: 700; margin: 0 0 12px; letter-spacing: -.03em; }
      .hero p  { font-size: 18px; color: #aaa; margin: 0 0 32px; }

      /* Configurator section */
      .section {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: .1em;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 16px;
      }

      /* The embed container */
      #forma-pergola-classic {
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0,0,0,.08);
        min-height: 400px;
      }

      /* Event log */
      .event-log {
        margin-top: 24px;
        background: #1a1a1a;
        border-radius: 8px;
        padding: 16px;
        font-family: monospace;
        font-size: 12px;
        color: #7fba00;
        max-height: 180px;
        overflow-y: auto;
      }
      .event-log p { margin: 0 0 4px; }
      .event-log .dim { color: #555; }

      footer {
        text-align: center;
        padding: 40px 24px;
        font-size: 12px;
        color: #aaa;
      }
    </style>
  </head>
  <body>

    <nav>
      <strong>Sun Pergola</strong>
      <a href="#">Products</a>
      <a href="#">Gallery</a>
      <a href="#">Contact</a>
    </nav>

    <div class="hero">
      <h1>Design your pergola</h1>
      <p>Configure size, colour and extras — get your price instantly.</p>
    </div>

    <div class="section">
      <div class="section-label">Configurator</div>

      <!--
        In production this would point to cdn.forma.studio/embed.js.
        During development the iframe app runs at localhost:4501,
        so we simulate the embed inline below.
      -->
      <div id="forma-pergola-classic"></div>

      <div class="event-log" id="log">
        <p class="dim">// Forma postMessage events will appear here</p>
      </div>
    </div>

    <footer>
      Playground — Forma Embed v0 · <a href="http://localhost:4501" target="_blank" style="color:#888">Open iframe app directly ↗</a>
    </footer>

    <script>
      // ── Mini embed simulation for the playground ──────────────
      // In production this is replaced by the real embed.js IIFE.

      (function () {
        const IFRAME_ORIGIN = 'http://localhost:4501';
        const CONFIG_ID = 'pergola-classic-v1';
        const container = document.getElementById('forma-pergola-classic');
        const log = document.getElementById('log');

        const iframe = document.createElement('iframe');
        iframe.src = `${IFRAME_ORIGIN}/?config=${CONFIG_ID}&host=${encodeURIComponent(location.hostname)}&parentOrigin=${encodeURIComponent(location.origin)}`;
        iframe.style.cssText = 'display:block;width:100%;height:720px;border:0;';
        iframe.title = 'Product Configurator';
        iframe.setAttribute('allowtransparency', 'true');
        container.appendChild(iframe);

        function addLog(type, payload) {
          const p = document.createElement('p');
          const time = new Date().toLocaleTimeString();
          p.innerHTML = `<span class="dim">${time}</span> <strong>${type}</strong> ${JSON.stringify(payload ?? {})}`;
          log.appendChild(p);
          log.scrollTop = log.scrollHeight;
        }

        window.addEventListener('message', (evt) => {
          if (evt.source !== iframe.contentWindow) return;
          if (!evt.data?.type?.startsWith('__forma:')) return;
          const { type, payload } = evt.data;

          if (type === '__forma:resize') {
            iframe.style.height = (payload?.height ?? 720) + 'px';
          }
          addLog(type, payload);
        });
      })();
    </script>

  </body>
</html>
